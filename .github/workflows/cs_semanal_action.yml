name: CS Semanal Automatizado

on:
  schedule:
    - cron: '0 11 * * 1'
  workflow_dispatch:

jobs:
  cs-semanal:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Rodar CS Semanal
        env:
          CLICKUP_TOKEN: ${{ secrets.CLICKUP_TOKEN }}
          META_TOKEN: ${{ secrets.META_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python cs_semanal_action.py

      - name: Publicar pagina no GitHub Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/cs.html docs/cs-dados.csv docs/cs-relatorios.json
          git commit -m "CS Semanal atualizado $(date +'%d/%m/%Y')" || echo "Nada para commitar"
          git push

      - name: Salvar output como artefato
        uses: actions/upload-artifact@v4
        with:
          name: cs-output-${{ github.run_id }}
          path: output_cs.txt
          retention-days: 7
